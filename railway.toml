# Railway deployment configuration

[build]
builder = "NIXPACKS"
nixpacksPlan = """
{
  "phases": {
    "setup": {
      "nixPkgs": ["nodejs", "npm", "gcc", "g++", "make", "python3"],
      "aptPkgs": ["build-essential"]
    },
    "install": "npm install",
    "build": "",
    "start": "npm start"
  },
  "variables": {
    "NODE_ENV": "production",
    "PORT": "8080"
  }
}
"""

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3