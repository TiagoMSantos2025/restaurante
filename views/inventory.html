<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat-item {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            min-width: 150px;
        }
        
        .stat-label {
            display: block;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .content {
            padding: 30px;
        }
        
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #dee2e6;
        }
        
        .section-title {
            font-size: 1.5em;
            color: #333;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: #007bff;
            color: white;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-warning {
            background: #ffc107;
            color: #212529;
        }
        
        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .table th, .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }
        
        .table th {
            background: #f8f9fa;
            font-weight: 600;
        }
        
        .table tr:hover {
            background: #f8f9fa;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            font-size: 1em;
            box-sizing: border-box;
        }
        
        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .form-col {
            flex: 1;
            min-width: 200px;
        }
        
        .low-stock {
            background-color: #ffeaa7 !important;
        }
        
        .out-of-stock {
            background-color: #fab1a0 !important;
        }
        
        .in-stock {
            background-color: #a29bfe !important;
        }
        
        .search-bar {
            margin-bottom: 20px;
        }
        
        .search-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            font-size: 1em;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            gap: 5px;
        }
        
        .page-btn {
            padding: 8px 12px;
            border: 1px solid #dee2e6;
            background: white;
            cursor: pointer;
            border-radius: 3px;
        }
        
        .page-btn.active {
            background: #007bff;
            color: white;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .close:hover {
            color: black;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .filter-section {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-item {
            display: flex;
            flex-direction: column;
        }
        
        .filter-item label {
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
            }
            
            .form-col {
                min-width: 100%;
            }
            
            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .stats {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Controle de Estoque</h1>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Total de Produtos:</span>
                    <span class="stat-value" id="total-products">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Baixo Estoque:</span>
                    <span class="stat-value" id="low-stock-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Sem Estoque:</span>
                    <span class="stat-value" id="out-of-stock-count">0</span>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Adicionar/Atualizar Estoque</h2>
                </div>
                <form id="stock-form">
                    <div class="form-row">
                        <div class="form-col">
                            <div class="form-group">
                                <label for="product-select">Produto:</label>
                                <select id="product-select" class="form-control" required>
                                    <option value="">Selecione um produto...</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-col">
                            <div class="form-group">
                                <label for="quantity-input">Quantidade Atual:</label>
                                <input type="number" id="quantity-input" class="form-control" min="0" required>
                            </div>
                        </div>
                        <div class="form-col">
                            <div class="form-group">
                                <label for="min-quantity-input">Quantidade Mínima:</label>
                                <input type="number" id="min-quantity-input" class="form-control" min="0" value="10">
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Atualizar Estoque</button>
                </form>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Filtros</h2>
                </div>
                <div class="filter-section">
                    <div class="filter-item">
                        <label for="category-filter">Categoria:</label>
                        <select id="category-filter" class="form-control">
                            <option value="">Todas as Categorias</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label for="stock-status-filter">Status de Estoque:</label>
                        <select id="stock-status-filter" class="form-control">
                            <option value="">Todos</option>
                            <option value="in-stock">Em Estoque</option>
                            <option value="low-stock">Baixo Estoque</option>
                            <option value="out-of-stock">Sem Estoque</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label for="search-input">Buscar:</label>
                        <input type="text" id="search-input" class="form-control" placeholder="Buscar produto...">
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Itens em Estoque</h2>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Categoria</th>
                            <th>Quantidade Atual</th>
                            <th>Quantidade Mínima</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="stock-table-body">
                        <!-- Itens de estoque serão carregados aqui -->
                    </tbody>
                </table>
                <div class="pagination" id="pagination">
                    <!-- Paginação será gerada aqui -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de edição -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2>Editar Estoque</h2>
            <form id="edit-stock-form">
                <input type="hidden" id="edit-product-id">
                <div class="form-group">
                    <label for="edit-product-name">Produto:</label>
                    <input type="text" id="edit-product-name" class="form-control" readonly>
                </div>
                <div class="form-group">
                    <label for="edit-quantity">Quantidade Atual:</label>
                    <input type="number" id="edit-quantity" class="form-control" min="0" required>
                </div>
                <div class="form-group">
                    <label for="edit-min-quantity">Quantidade Mínima:</label>
                    <input type="number" id="edit-min-quantity" class="form-control" min="0" required>
                </div>
                <button type="submit" class="btn btn-success">Salvar Alterações</button>
            </form>
        </div>
    </div>

    <script>
        let products = [];
        let categories = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        // Função para carregar produtos e categorias
        function loadInitialData() {
            // Simulação de dados - em uma implementação real, isso viria de uma API
            products = [
                {
                    id: 1,
                    nome: 'Refrigerante Lata',
                    categoria_id: 10,
                    categoria_nome: 'Refrigerantes',
                    estoque_atual: 15,
                    quantidade_minima: 10
                },
                {
                    id: 2,
                    nome: 'Cerveja Lata',
                    categoria_id: 7,
                    categoria_nome: 'Cerveja',
                    estoque_atual: 5,
                    quantidade_minima: 20
                },
                {
                    id: 3,
                    nome: 'Porção de Batata Frita',
                    categoria_id: 6,
                    categoria_nome: 'Porções',
                    estoque_atual: 0,
                    quantidade_minima: 5
                },
                {
                    id: 4,
                    nome: 'Hambúrguer Artesanal',
                    categoria_id: 2,
                    categoria_nome: 'Lanches',
                    estoque_atual: 25,
                    quantidade_minima: 10
                },
                {
                    id: 5,
                    nome: 'Água Mineral 500ml',
                    categoria_id: 9,
                    categoria_nome: 'Água',
                    estoque_atual: 30,
                    quantidade_minima: 15
                }
            ];

            categories = [
                { id: 1, nome: 'Espetinhos' },
                { id: 2, nome: 'Lanches' },
                { id: 3, nome: 'Chapa' },
                { id: 4, nome: 'Macarrão na Chapa' },
                { id: 5, nome: 'Pratos Executivos' },
                { id: 6, nome: 'Porções' },
                { id: 7, nome: 'Cerveja' },
                { id: 8, nome: 'Energéticos' },
                { id: 9, nome: 'Água' },
                { id: 10, nome: 'Refrigerantes' },
                { id: 11, nome: 'Pizza' }
            ];

            populateProductSelect();
            populateCategoryFilter();
            updateStats();
            renderStockTable();
        }

        // Função para popular o select de produtos
        function populateProductSelect() {
            const select = document.getElementById('product-select');
            select.innerHTML = '<option value="">Selecione um produto...</option>';
            
            products.forEach(product => {
                const option = document.createElement('option');
                option.value = product.id;
                option.textContent = `${product.nome} (${product.estoque_atual} un)`;
                select.appendChild(option);
            });
        }

        // Função para popular o filtro de categorias
        function populateCategoryFilter() {
            const select = document.getElementById('category-filter');
            select.innerHTML = '<option value="">Todas as Categorias</option>';
            
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category.id;
                option.textContent = category.nome;
                select.appendChild(option);
            });
        }

        // Função para atualizar estatísticas
        function updateStats() {
            document.getElementById('total-products').textContent = products.length;
            
            const lowStockCount = products.filter(p => p.estoque_atual <= p.quantidade_minima && p.estoque_atual > 0).length;
            const outOfStockCount = products.filter(p => p.estoque_atual === 0).length;
            
            document.getElementById('low-stock-count').textContent = lowStockCount;
            document.getElementById('out-of-stock-count').textContent = outOfStockCount;
        }

        // Função para obter status de estoque
        function getStockStatus(quantidade, minima) {
            if (quantidade === 0) return 'Sem Estoque';
            if (quantidade <= minima) return 'Baixo Estoque';
            return 'Em Estoque';
        }

        // Função para obter classe CSS para status de estoque
        function getStockClass(quantidade, minima) {
            if (quantidade === 0) return 'out-of-stock';
            if (quantidade <= minima) return 'low-stock';
            return 'in-stock';
        }

        // Função para renderizar a tabela de estoque
        function renderStockTable() {
            const tbody = document.getElementById('stock-table-body');
            const categoryFilter = document.getElementById('category-filter').value;
            const statusFilter = document.getElementById('stock-status-filter').value;
            const searchTerm = document.getElementById('search-input').value.toLowerCase();

            // Filtrar produtos
            let filteredProducts = products.filter(product => {
                const matchesCategory = !categoryFilter || product.categoria_id == categoryFilter;
                const status = getStockStatus(product.estoque_atual, product.quantidade_minima);
                const matchesStatus = !statusFilter || 
                    (statusFilter === 'in-stock' && status === 'Em Estoque') ||
                    (statusFilter === 'low-stock' && status === 'Baixo Estoque') ||
                    (statusFilter === 'out-of-stock' && status === 'Sem Estoque');
                const matchesSearch = product.nome.toLowerCase().includes(searchTerm);
                
                return matchesCategory && matchesStatus && matchesSearch;
            });

            // Paginação
            const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedProducts = filteredProducts.slice(startIndex, startIndex + itemsPerPage);

            tbody.innerHTML = '';
            
            paginatedProducts.forEach(product => {
                const status = getStockStatus(product.estoque_atual, product.quantidade_minima);
                const rowClass = getStockClass(product.estoque_atual, product.quantidade_minima);
                
                const row = document.createElement('tr');
                row.className = rowClass;
                row.innerHTML = `
                    <td>${product.nome}</td>
                    <td>${product.categoria_nome}</td>
                    <td>${product.estoque_atual}</td>
                    <td>${product.quantidade_minima}</td>
                    <td>${status}</td>
                    <td>
                        <button class="btn btn-warning" onclick="openEditModal(${product.id})">Editar</button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            renderPagination(totalPages);
        }

        // Função para renderizar paginação
        function renderPagination(totalPages) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            if (totalPages <= 1) return;

            // Botão Anterior
            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.textContent = 'Anterior';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderStockTable();
                }
            };
            pagination.appendChild(prevBtn);

            // Páginas
            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.onclick = () => {
                    currentPage = i;
                    renderStockTable();
                };
                pagination.appendChild(pageBtn);
            }

            // Botão Próximo
            const nextBtn = document.createElement('button');
                nextBtn.className = 'page-btn';
                nextBtn.textContent = 'Próximo';
                nextBtn.disabled = currentPage === totalPages;
                nextBtn.onclick = () => {
                    if (currentPage < totalPages) {
                        currentPage++;
                        renderStockTable();
                    }
                };
                pagination.appendChild(nextBtn);
        }

        // Função para abrir modal de edição
        function openEditModal(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            document.getElementById('edit-product-id').value = product.id;
            document.getElementById('edit-product-name').value = product.nome;
            document.getElementById('edit-quantity').value = product.estoque_atual;
            document.getElementById('edit-min-quantity').value = product.quantidade_minima;

            document.getElementById('edit-modal').style.display = 'block';
        }

        // Função para fechar modal de edição
        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        // Event listeners para formulários
        document.getElementById('stock-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const productId = parseInt(document.getElementById('product-select').value);
            const quantity = parseInt(document.getElementById('quantity-input').value);
            const minQuantity = parseInt(document.getElementById('min-quantity-input').value);

            if (!productId || isNaN(quantity) || isNaN(minQuantity)) {
                alert('Por favor, preencha todos os campos corretamente.');
                return;
            }

            // Atualizar produto
            const product = products.find(p => p.id === productId);
            if (product) {
                product.estoque_atual = quantity;
                product.quantidade_minima = minQuantity;
                
                updateStats();
                renderStockTable();
                
                // Resetar formulário
                this.reset();
                document.getElementById('min-quantity-input').value = 10;
                
                alert('Estoque atualizado com sucesso!');
            }
        });

        document.getElementById('edit-stock-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const productId = parseInt(document.getElementById('edit-product-id').value);
            const quantity = parseInt(document.getElementById('edit-quantity').value);
            const minQuantity = parseInt(document.getElementById('edit-min-quantity').value);

            if (isNaN(quantity) || isNaN(minQuantity)) {
                alert('Por favor, preencha todos os campos corretamente.');
                return;
            }

            // Atualizar produto
            const product = products.find(p => p.id === productId);
            if (product) {
                product.estoque_atual = quantity;
                product.quantidade_minima = minQuantity;
                
                updateStats();
                renderStockTable();
                closeEditModal();
                
                alert('Produto atualizado com sucesso!');
            }
        });

        // Event listeners para filtros
        document.getElementById('category-filter').addEventListener('change', function() {
            currentPage = 1;
            renderStockTable();
        });

        document.getElementById('stock-status-filter').addEventListener('change', function() {
            currentPage = 1;
            renderStockTable();
        });

        document.getElementById('search-input').addEventListener('input', function() {
            currentPage = 1;
            renderStockTable();
        });

        // Fechar modais ao clicar fora
        window.onclick = function(event) {
            const editModal = document.getElementById('edit-modal');
            if (event.target === editModal) {
                closeEditModal();
            }
        };

        // Fechar modais com ESC
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeEditModal();
            }
        });

        // Inicializar a página
        document.addEventListener('DOMContentLoaded', function() {
            loadInitialData();
        });
    </script>
</body>
</html>
